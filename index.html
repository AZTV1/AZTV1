<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETFLIX+</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {margin:0;background:black;color:white;font-family:Arial;}
.header {padding:15px;font-size:24px;color:#e50914;}

video {
  width:100%;
  height:240px;
  background:black;
}

.episode {
  background:#1a1a1a;
  margin:6px;
  padding:12px;
  border-radius:8px;
  cursor:pointer;
  position:relative;
}

.delete {
  position:absolute;
  right:10px;
  color:red;
  display:none;
}

.admin .delete {display:block;}

input,button {
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:none;
}

button {
  background:#e50914;
  color:white;
}

.secret {
  position:fixed;
  bottom:10px;
  right:10px;
  opacity:0.3;
}
</style>
</head>

<body>

<div class="header">NETFLIX+</div>

<video id="video" controls playsinline></video>
<div id="title" style="padding:10px;">Episode</div>

<div style="padding:10px;">
<input type="file" id="file">
<input type="text" id="link" placeholder="Drive / Direct / m3u8">
<input type="number" id="num" placeholder="Episode Number">

<button onclick="add()">Add Episode</button>
</div>

<div id="episodes"></div>

<button class="secret" onclick="login()">⚙️</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, onValue } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

// 🔥 بياناتك جاهزة
const firebaseConfig = {
  apiKey: "AIzaSyArRrIq2iTS3deGSaFgX70k1ZB98wKvLbs",
  authDomain: "mymoveis.firebaseapp.com",
  databaseURL: "https://mymoveis-default-rtdb.firebaseio.com",
  projectId: "mymoveis",
  storageBucket: "mymoveis.firebasestorage.app",
  messagingSenderId: "771499622971",
  appId: "1:771499622971:web:1fae519506a6d719be121e",
  measurementId: "G-B4Q2NMQTY9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data = [];
let current = 0;
let isAdmin = false;
let hls;

// 🔥 تحميل مباشر من Firebase
onValue(ref(db, "episodes"), (snapshot) => {
  data = snapshot.val() || [];
  render();
});

// ➕ إضافة حلقة
window.add = function(){
  const num = document.getElementById("num").value;
  const file = document.getElementById("file").files[0];
  const link = document.getElementById("link").value;

  let src = "";

  if(file){
    src = URL.createObjectURL(file);
  } else if(link){
    const id = link.match(/[-\w]{25,}/);
    if(id){
      src = "https://drive.google.com/uc?export=download&id="+id[0];
    } else {
      src = link;
    }
  }

  if(!num || !src) return alert("❌");

  data.push({num:parseInt(num), url:src});
  data.sort((a,b)=>a.num-b.num);

  set(ref(db, "episodes"), data); // 🔥 حفظ أونلاين
};

// 🎬 عرض الحلقات
function render(){
  const box = document.getElementById("episodes");
  box.innerHTML="";

  data.forEach((ep,i)=>{
    const div = document.createElement("div");
    div.className="episode";

    div.innerHTML = `
      Episode ${ep.num}
      <span class="delete" onclick="del(${i})">🗑</span>
    `;

    div.onclick = ()=>{current=i;play();};

    box.appendChild(div);
  });
}

// ▶ تشغيل
function play(){
  const v = document.getElementById("video");
  const ep = data[current];
  if(!ep) return;

  document.getElementById("title").innerText = "Episode "+ep.num;

  if(ep.url.includes(".m3u8")){
    if(hls) hls.destroy();
    hls = new Hls();
    hls.loadSource(ep.url);
    hls.attachMedia(v);
  } else {
    if(hls) hls.destroy();
    v.src = ep.url;
  }
}

// ❌ حذف
window.del = function(i){
  if(!isAdmin) return alert("❌ Not allowed");

  data.splice(i,1);
  set(ref(db, "episodes"), data);
};

// 🔐 أدمن
window.login = function(){
  const p = prompt("Enter code");
  if(p=="2030"){
    isAdmin=true;
    document.body.classList.add("admin");
    alert("🔥 ADMIN MODE");
  }
};

</script>

</body>
</html>
