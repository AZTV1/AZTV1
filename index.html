<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>JOKER</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#000;color:#fff;font-family:'Cairo'}

header{padding:15px 50px;font-size:28px;font-weight:bold}

.row{display:flex;gap:10px;overflow-x:auto;padding:20px}
.row::-webkit-scrollbar{display:none}

.card{min-width:200px;height:300px;cursor:pointer;transition:.3s}
.card img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.card:hover{transform:scale(1.1)}

#admin{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
display:flex;
gap:10px;
}

input,select{padding:8px;border:none;border-radius:5px}
button{padding:8px 15px;cursor:pointer}
</style>
</head>

<body>

<header>JOKER</header>

<div class="row" id="movies"></div>

<!-- ADMIN -->
<div id="admin">
<input id="name" placeholder="اسم الفيلم">
<input id="url" placeholder="رابط Google Drive">
<select id="type">
<option value="movie">فيلم</option>
<option value="tv">مسلسل</option>
</select>
<button onclick="addMovie()">إضافة</button>
</div>

<script>

/* 🔥 Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyArRrIq2iTS3deGSaFgX70k1ZB98wKvLbs",
  authDomain: "mymoveis.firebaseapp.com",
  databaseURL: "https://mymoveis-default-rtdb.firebaseio.com",
  projectId: "mymoveis"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🔑 TMDB */
const API_KEY = "dde3081de76eb8146bcd702921acd3e4";

/* تحويل رابط Google Drive */
function convertDrive(url){
if(url.includes("drive.google.com")){
let id = url.split("/d/")[1].split("/")[0];
return "https://drive.google.com/file/d/"+id+"/preview";
}
return url;
}

/* ➕ إضافة */
async function addMovie(){

let name = document.getElementById("name").value;
let url = document.getElementById("url").value;
let type = document.getElementById("type").value;

if(!name || !url){
alert("اكتب الاسم والرابط");
return;
}

/* تحويل الرابط */
url = convertDrive(url);

/* TMDB */
const res = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${API_KEY}&query=${name}&language=ar-SA`);
const data = await res.json();

const m = data.results[0] || {};

db.ref("movies").push({
name: m.title || m.name || name,
poster: m.poster_path ? "https://image.tmdb.org/t/p/w500"+m.poster_path : "",
story: m.overview || "لا يوجد وصف",
rating: m.vote_average || "0",
url: url
});

alert("تمت الإضافة 🔥");
}

/* 📺 عرض */
db.ref("movies").on("value", snap=>{

const cont = document.getElementById("movies");
cont.innerHTML = "";

snap.forEach(child=>{
let m = child.val();

cont.innerHTML += `
<div class="card" onclick='play(${JSON.stringify(m)})'>
<img src="${m.poster}">
</div>`;
});

});

/* ▶ تشغيل */
function play(m){

document.body.innerHTML = `
<h1 style="padding:20px">${m.name}</h1>
<p style="padding:20px">${m.story}</p>
<p style="padding:20px">⭐ ${m.rating}</p>

<iframe width="100%" height="400" src="${m.url}" allowfullscreen></iframe>

<br><br>
<button onclick="location.reload()">رجوع</button>
`;

}

</script>

</body>
</html>
