<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NETFLIX+</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* HERO */
.hero {
  position: relative;
}

video {
  width: 100%;
  height: 260px;
  object-fit: cover;
  background: black;
}

/* Overlay */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* Title */
.title {
  font-size: 20px;
  font-weight: bold;
}

/* Buttons */
.controls {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #e50914;
  color: white;
  font-weight: bold;
}

/* Panel */
.panel {
  padding: 15px;
}

/* Inputs */
input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
}

/* Episodes */
.episodes {
  padding: 10px;
}

.episode {
  background: #1a1a1a;
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
  cursor: pointer;
}

.episode.active {
  background: #e50914;
}

</style>
</head>

<body>

<div class="hero">
  <video id="videoPlayer" controls></video>

  <div class="overlay">
    <div class="title" id="title">Episode</div>

    <div class="controls">
      <button onclick="prev()">⬅ Prev</button>
      <button onclick="next()">Next ➡</button>
    </div>
  </div>
</div>

<div class="panel">

  <input type="file" id="fileInput">
  <input type="text" id="driveLink" placeholder="Google Drive Link">
  <input type="text" id="directLink" placeholder="Direct / m3u8 Link">
  <input type="number" id="epNum" placeholder="Episode Number">

  <button onclick="addEpisode()">Add Episode</button>

</div>

<div class="episodes" id="episodesList"></div>

<script>
let episodes = [];
let current = 0;
let hls;

// تحميل آخر حلقة
if(localStorage.getItem("ep")){
  current = parseInt(localStorage.getItem("ep"));
}

// إضافة حلقة
function addEpisode(){
  const num = document.getElementById("epNum").value;
  const file = document.getElementById("fileInput").files[0];
  const drive = document.getElementById("driveLink").value;
  const direct = document.getElementById("directLink").value;

  let src = "";

  if(file){
    src = URL.createObjectURL(file);
  } else if(drive){
    const id = drive.match(/[-\w]{25,}/);
    if(id) src = "https://drive.google.com/uc?export=download&id="+id[0];
  } else if(direct){
    src = direct;
  }

  if(!num || !src){
    alert("Enter data");
    return;
  }

  episodes.push({number: parseInt(num), url: src});
  episodes.sort((a,b)=>a.number-b.number);

  render();
}

// عرض الحلقات
function render(){
  const list = document.getElementById("episodesList");
  list.innerHTML = "";

  episodes.forEach((ep,i)=>{
    const div = document.createElement("div");
    div.className = "episode"+(i===current?" active":"");
    div.innerText = "Episode "+ep.number;

    div.onclick = ()=>{
      current = i;
      play();
    };

    list.appendChild(div);
  });
}

// تشغيل
function play(){
  const video = document.getElementById("videoPlayer");
  const ep = episodes[current];

  if(!ep) return;

  document.getElementById("title").innerText = "Episode "+ep.number;

  localStorage.setItem("ep", current);

  if(ep.url.includes(".m3u8")){
    if(hls) hls.destroy();

    hls = new Hls();
    hls.loadSource(ep.url);
    hls.attachMedia(video);
  } else {
    if(hls) hls.destroy();
    video.src = ep.url;
  }

  render();
}

// التالي
function next(){
  if(current < episodes.length-1){
    current++;
    play();
  }
}

// السابق
function prev(){
  if(current > 0){
    current--;
    play();
  }
}
</script>

</body>
</html>
