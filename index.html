<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشغل مسلسلات</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial;
  padding: 15px;
}

video {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 15px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #e50914;
  color: white;
  font-weight: bold;
}

.episodes {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.episode {
  background: #1a1a1a;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
}

.episode.active {
  background: #e50914;
}
</style>
</head>

<body>

<h2>🎬 المسلسل</h2>

<video id="videoPlayer" controls></video>

<div class="episodes" id="episodesList"></div>

<script>
let hls;
let currentIndex = 0;

// 🔥 الحلقة جاهزة من Google Drive
const episodes = [
  {
    number: 1,
    title: "الحلقة 1",
    url: "https://drive.google.com/uc?export=download&id=1DTLrVfgL0EKBnMfUpRbMTCgL9Kqih_V_"
  }
];

// تشغيل تلقائي
function playEpisode() {
  const video = document.getElementById("videoPlayer");
  const source = episodes[currentIndex].url;

  if (source.includes(".m3u8")) {
    if (hls) hls.destroy();
    hls = new Hls();
    hls.loadSource(source);
    hls.attachMedia(video);
  } else {
    if (hls) hls.destroy();
    video.src = source;
  }
}

// عرض الحلقات
const list = document.getElementById("episodesList");

episodes.forEach((ep, index) => {
  const div = document.createElement("div");
  div.className = "episode";
  div.innerText = ep.title;

  div.onclick = () => {
    currentIndex = index;
    playEpisode();
  };

  list.appendChild(div);
});

// تشغيل مباشر
playEpisode();
</script>

</body>
</html>
