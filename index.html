<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>NETFLIX+</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#000;color:#fff;font-family:'Cairo'}

header{
padding:20px;
font-size:32px;
color:#e50914;
font-weight:bold;
}

.row{display:flex;gap:12px;overflow-x:auto;padding:20px}
.card{min-width:200px;height:300px;cursor:pointer}
.card img{width:100%;height:100%;object-fit:cover;border-radius:6px}

#admin{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

input,select{
padding:8px;
border:none;
border-radius:5px;
}

button{
padding:8px 15px;
background:#e50914;
color:#fff;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<header>NETFLIX+</header>

<div class="row" id="movies"></div>

<!-- ADMIN -->
<div id="admin">
<input id="name" placeholder="اسم الفيلم">
<input id="url" placeholder="رابط Google Drive أو mp4">
<select id="type">
<option value="movie">فيلم</option>
<option value="tv">مسلسل</option>
</select>
<button onclick="addMovie()">إضافة</button>
</div>

<script>

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyArRrIq2iTS3deGSaFgX70k1ZB98wKvLbs",
  authDomain: "mymoveis.firebaseapp.com",
  databaseURL: "https://mymoveis-default-rtdb.firebaseio.com",
  projectId: "mymoveis"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* TMDB */
const API_KEY = "dde3081de76eb8146bcd702921acd3e4";

/* تحويل Google Drive */
function getDriveId(url){
if(url.includes("/d/")) return url.split("/d/")[1].split("/")[0];
if(url.includes("id=")) return url.split("id=")[1];
return null;
}

/* إضافة */
async function addMovie(){

let name = document.getElementById("name").value;
let url = document.getElementById("url").value;

if(!name || !url){
alert("اكتب الاسم والرابط");
return;
}

/* TMDB */
let movieData = {
name: name,
poster: "",
story: "لا يوجد وصف",
rating: "0"
};

try{
const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${name}&language=ar-SA`);
const data = await res.json();
if(data.results[0]){
movieData = {
name: data.results[0].title,
poster: "https://image.tmdb.org/t/p/w500"+data.results[0].poster_path,
story: data.results[0].overview,
rating: data.results[0].vote_average
};
}
}catch(e){}

/* حفظ */
db.ref("movies").push({
...movieData,
url:url
});

alert("تمت الإضافة 🔥");
}

/* عرض */
db.ref("movies").on("value", snap=>{

const cont = document.getElementById("movies");
cont.innerHTML="";

snap.forEach(child=>{
let m = child.val();

cont.innerHTML+=`
<div class="card" onclick='play(${JSON.stringify(m)})'>
<img src="${m.poster}">
</div>`;
});

});

/* تشغيل */
function play(m){

let html = "";

/* Google Drive */
if(m.url.includes("drive.google.com")){
let id = getDriveId(m.url);

html = `
<iframe width="100%" height="400"
src="https://drive.google.com/file/d/${id}/preview"
allowfullscreen>
</iframe>

<br>
<a href="https://drive.google.com/uc?export=download&id=${id}">
تشغيل بديل
</a>
`;
}

/* mp4 */
else{
html = `
<video controls width="100%">
<source src="${m.url}">
</video>
`;
}

document.body.innerHTML = `
<h2>${m.name}</h2>
<p>${m.story}</p>
<p>⭐ ${m.rating}</p>

${html}

<br><br>
<button onclick="location.reload()">رجوع</button>
`;
}

</script>

</body>
</html>
