<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOKER</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Cairo';
}

/* HEADER */
header{
padding:15px 50px;
font-size:28px;
font-weight:bold;
}

/* ROW */
.row{
display:flex;
gap:10px;
overflow-x:auto;
padding:20px;
}
.row::-webkit-scrollbar{display:none}

/* CARD */
.card{
min-width:200px;
height:300px;
cursor:pointer;
transition:.3s;
}
.card img{
width:100%;
height:100%;
object-fit:cover;
border-radius:5px;
}
.card:hover{
transform:scale(1.1);
}

/* ADMIN */
#admin{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
display:flex;
gap:10px;
}

input,select{
padding:8px;
border:none;
border-radius:5px;
}
button{
padding:8px 15px;
cursor:pointer;
}

</style>
</head>

<body>

<header>JOKER</header>

<div class="row" id="movies"></div>

<!-- ADMIN -->
<div id="admin">
<input id="name" placeholder="اسم الفيلم">
<input id="url" placeholder="رابط التشغيل">
<select id="type">
<option value="movie">فيلم</option>
<option value="tv">مسلسل</option>
</select>
<button onclick="addMovie()">إضافة</button>
</div>

<script>

/* 🔥 Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyArRrIq2iTS3deGSaFgX70k1ZB98wKvLbs",
  authDomain: "mymoveis.firebaseapp.com",
  databaseURL: "https://mymoveis-default-rtdb.firebaseio.com",
  projectId: "mymoveis",
  storageBucket: "mymoveis.firebasestorage.app",
  messagingSenderId: "771499622971",
  appId: "1:771499622971:web:152e5a9acea54407be121e",
  measurementId: "G-180RE7CGD1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🔑 TMDB */
const API_KEY = "dde3081de76eb8146bcd702921acd3e4";

/* ➕ إضافة فيلم */
async function addMovie(){

let name = document.getElementById("name").value;
let url = document.getElementById("url").value;
let type = document.getElementById("type").value;

if(!name || !url){
alert("اكتب الاسم والرابط");
return;
}

const res = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${API_KEY}&query=${name}&language=ar-SA`);
const data = await res.json();

const m = data.results[0];

const vid = await fetch(`https://api.themoviedb.org/3/${type}/${m.id}/videos?api_key=${API_KEY}`);
const vd = await vid.json();

const trailer = vd.results.find(v=>v.type==="Trailer");

db.ref("movies").push({
name: m.title || m.name,
poster: "https://image.tmdb.org/t/p/w500"+m.poster_path,
story: m.overview,
rating: m.vote_average,
url: url,
trailer: trailer?.key || ""
});

alert("تمت الإضافة 🔥");
}

/* 📺 عرض الأفلام */
db.ref("movies").on("value", snap=>{

const cont = document.getElementById("movies");
cont.innerHTML = "";

snap.forEach(child=>{
let m = child.val();

cont.innerHTML += `
<div class="card" onclick='play(${JSON.stringify(m)})'>
<img src="${m.poster}">
</div>`;
});

});

/* ▶ تشغيل */
function play(m){

document.body.innerHTML = `
<h1 style="padding:20px">${m.name}</h1>
<p style="padding:20px">${m.story}</p>
<p style="padding:20px">⭐ ${m.rating}</p>

<video controls width="100%" src="${m.url}"></video>

<iframe width="100%" height="300"
src="https://www.youtube.com/embed/${m.trailer}">
</iframe>

<br><br>
<button onclick="location.reload()">رجوع</button>
`;

}

</script>

</body>
</html>
