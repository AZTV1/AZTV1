<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETFLIX+</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
}

/* Header */
.header {
  padding: 15px;
  font-size: 24px;
  color: #e50914;
  font-weight: bold;
}

/* Home */
.row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
}

.card {
  min-width: 150px;
  height: 220px;
  background: #222;
  border-radius: 10px;
  display: flex;
  align-items: end;
  padding: 10px;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
}

/* Player */
video {
  width: 100%;
  height: 230px;
  object-fit: cover;
}

/* Episodes */
.episode {
  background: #1a1a1a;
  margin: 6px;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  position: relative;
}

.delete {
  position: absolute;
  right: 10px;
  color: red;
  display: none;
}

.admin .delete {
  display: block;
}

/* Panel */
.panel {
  padding: 10px;
}

input, button {
  width: 100%;
  margin-top: 6px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #e50914;
  color: white;
}

/* hidden */
#playerPage { display: none; }

.secret {
  position: fixed;
  bottom: 10px;
  right: 10px;
  opacity: 0.3;
}
</style>
</head>

<body>

<div class="header">NETFLIX+</div>

<!-- 🏠 الصفحة الرئيسية -->
<div id="home">

  <div class="row">
    <div class="card" onclick="openSeries('series1')">Series 1</div>
    <div class="card" onclick="openSeries('series2')">Series 2</div>
  </div>

</div>

<!-- 🎬 صفحة المشاهدة -->
<div id="playerPage">

  <video id="video" controls></video>

  <div id="title" style="padding:10px;">Episode</div>

  <div class="panel">

    <input type="file" id="file">
    <input type="text" id="link" placeholder="Drive / Direct Link">
    <input type="number" id="num" placeholder="Episode Number">

    <button onclick="add()">Add Episode</button>
    <button onclick="back()">⬅ Back</button>

  </div>

  <div id="episodes"></div>

</div>

<button class="secret" onclick="login()">⚙️</button>

<script>
let hls;
let current = 0;
let currentSeries = "";
let isAdmin = false;

// بيانات المسلسلات
let data = {
  series1: [],
  series2: []
};

// فتح مسلسل
function openSeries(name){
  currentSeries = name;
  document.getElementById("home").style.display="none";
  document.getElementById("playerPage").style.display="block";

  loadLast();
  render();
  play();
}

// رجوع
function back(){
  document.getElementById("home").style.display="block";
  document.getElementById("playerPage").style.display="none";
}

// إضافة حلقة
function add(){
  const num = document.getElementById("num").value;
  const file = document.getElementById("file").files[0];
  const link = document.getElementById("link").value;

  let src="";

  if(file){
    src = URL.createObjectURL(file);
  } else if(link){
    const id = link.match(/[-\w]{25,}/);
    if(id){
      src = "https://drive.google.com/uc?export=download&id="+id[0];
    } else {
      src = link;
    }
  }

  if(!num || !src) return alert("❌");

  data[currentSeries].push({num:parseInt(num), url:src});
  data[currentSeries].sort((a,b)=>a.num-b.num);

  render();
}

// عرض الحلقات
function render(){
  const box = document.getElementById("episodes");
  box.innerHTML="";

  data[currentSeries].forEach((ep,i)=>{
    const div = document.createElement("div");
    div.className="episode";
    div.innerHTML = `
      Episode ${ep.num}
      <span class="delete" onclick="del(${i})">🗑</span>
    `;

    div.onclick=()=>{current=i; play();};

    box.appendChild(div);
  });
}

// تشغيل
function play(){
  const v = document.getElementById("video");
  const ep = data[currentSeries][current];
  if(!ep) return;

  document.getElementById("title").innerText="Episode "+ep.num;

  localStorage.setItem("last_"+currentSeries, current);

  if(ep.url.includes(".m3u8")){
    if(hls) hls.destroy();
    hls = new Hls();
    hls.loadSource(ep.url);
    hls.attachMedia(v);
  } else {
    if(hls) hls.destroy();
    v.src = ep.url;
  }
}

// حذف
function del(i){
  if(!isAdmin) return alert("❌ Not allowed");
  data[currentSeries].splice(i,1);
  render();
}

// أدمن
function login(){
  const p = prompt("code");
  if(p=="2030"){
    isAdmin = true;
    document.body.classList.add("admin");
    alert("🔥 Admin ON");
  }
}

// تحميل آخر حلقة
function loadLast(){
  const saved = localStorage.getItem("last_"+currentSeries);
  if(saved) current = parseInt(saved);
}
</script>

</body>
</html>
