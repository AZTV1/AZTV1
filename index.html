<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOKER | 4K STREAM</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e50914; --joker-green: #32cd32; --joker-purple: #7b2cbf; }
        body { background-color: #080808; color: #fff; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* شاشة الدخول */
        #lock-screen { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .lock-box { text-align: center; border: 1px solid var(--joker-purple); padding: 40px; border-radius: 20px; background: #111; }

        /* الهيدر */
        header { padding: 20px 50px; display: flex; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); position: absolute; width: 100%; z-index: 100; box-sizing: border-box; }
        .logo { font-size: 40px; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .logo img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--joker-green); }
        .nav-links { margin-right: 40px; display: flex; gap: 25px; }
        .nav-links a { color: #e5e5e5; text-decoration: none; font-size: 16px; transition: 0.3s; }
        .nav-links a:hover { color: var(--joker-green); }

        /* الواجهة الرئيسية (صورة الجوكر) */
        .hero { height: 80vh; background: linear-gradient(to right, #080808 20%, transparent 80%), url('https://images.alphacoders.com/104/1043951.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; padding: 0 50px; }
        .hero-content { max-width: 600px; text-align: right; }
        .hero-content h1 { font-size: 80px; margin: 0; color: #fff; }
        
        /* إضافة الأفلام */
        .admin-panel { background: #141414; padding: 20px; margin: -50px 50px 20px; border-radius: 10px; position: relative; z-index: 200; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; border: 1px solid #333; }
        .admin-panel input, .admin-panel select { background: #333; border: none; padding: 10px; color: #fff; border-radius: 5px; min-width: 200px; }
        .btn-add { background: var(--joker-purple); color: #fff; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* الأقسام والأفلام */
        .section-title { margin: 40px 50px 20px; font-size: 24px; color: #fff; text-align: right; border-right: 4px solid var(--primary); padding-right: 15px; }
        .movie-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 0 50px 50px; }
        
        .movie-card { position: relative; border-radius: 8px; overflow: hidden; transition: 0.4s; cursor: pointer; background: #111; }
        .movie-card:hover { transform: scale(1.1); z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.6); }
        .movie-card img { width: 100%; height: 350px; object-fit: cover; }
        .movie-card video { width: 100%; height: 350px; object-position: center; object-fit: cover; display: none; }
        .movie-card:hover video { display: block; }
        .movie-card:hover img { display: none; }
        
        .movie-info { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 20px; box-sizing: border-box; }
        .movie-info h3 { margin: 0; font-size: 16px; }
        .badge { background: var(--joker-green); color: #000; padding: 2px 6px; font-size: 10px; border-radius: 3px; font-weight: bold; }
        
        .delete-btn { position: absolute; top: 10px; left: 10px; background: rgba(255,0,0,0.6); border: none; color: #fff; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-box">
        <h1 style="color:var(--joker-green); font-size: 40px;">JOKER VIP</h1>
        <input type="password" id="entryPass" placeholder="كلمة السر 2030" style="padding:10px; border-radius:5px; border:none; text-align:center;">
        <button onclick="unlock()" class="btn-add" style="margin-top:20px;">دخول</button>
    </div>
</div>

<div id="main-site" style="display:none;">
    <header>
        <div class="logo">
            <img src="https://i.pinimg.com/originals/66/32/ab/6632ab2673295963952f41b2725e6834.jpg">
            JOKER
        </div>
        <nav class="nav-links">
            <a href="#">الرئيسية</a>
            <a href="#">رعب</a>
            <a href="#">أكشن</a>
            <a href="#">رومانسي</a>
            <a href="#">مسلسلات</a>
        </nav>
    </header>

    <div class="hero">
        <div class="hero-content">
            <h1>JOKER</h1>
            <p style="font-size: 20px; color: #ccc;">أهلاً بك في عالم الفوضى والسينما. استمتع بمشاهدة أفلامك المفضلة بدقة 4K.</p>
        </div>
    </div>

    <div class="admin-panel">
        <input type="text" id="mName" placeholder="اسم الفيلم (English)">
        <input type="text" id="mUrl" placeholder="رابط MP4">
        <select id="mType">
            <option value="رعب">رعب</option>
            <option value="أكشن">أكشن</option>
            <option value="رومانسي">رومانسي</option>
            <option value="مسلسل">مسلسل</option>
        </select>
        <button class="btn-add" onclick="addMovie()">إضافة الآن +</button>
    </div>

    <div class="section-title">الأعمال المميزة</div>
    <div class="movie-row" id="container"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://mymoveis-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const API_KEY = "89736868843236315513220579e72877";

    function unlock() {
        if(document.getElementById('entryPass').value === "2030") {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
        } else { alert("خطأ!"); }
    }

    async function addMovie() {
        const name = document.getElementById('mName').value;
        const url = document.getElementById('mUrl').value;
        const type = document.getElementById('mType').value;
        if (name && url) {
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${name}`);
            const data = await res.json();
            const info = data.results[0] || {};
            db.ref('movies').push({
                name: name, url: url, type: type,
                poster: info.poster_path ? `https://image.tmdb.org/t/p/w500${info.poster_path}` : 'https://via.placeholder.com/500x750'
            });
        }
    }

    function deleteMovie(id) {
        if(prompt("كلمة سر الحذف") === "2030") db.ref('movies').child(id).remove();
    }

    db.ref('movies').on('value', (snap) => {
        const cont = document.getElementById('container');
        cont.innerHTML = "";
        snap.forEach((child) => {
            const d = child.val();
            cont.innerHTML += `
                <div class="movie-card">
                    <button class="delete-btn" onclick="deleteMovie('${child.key}')">X</button>
                    <img src="${d.poster}">
                    <video controls src="${d.url}"></video>
                    <div class="movie-info">
                        <span class="badge">4K Ultra HD</span>
                        <h3 class="movie-name">${d.name}</h3>
                        <p style="font-size:12px; color:var(--joker-green)">${d.type}</p>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
