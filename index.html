<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOKER | المنصة العالمية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --joker-main: #7b2cbf; --joker-green: #32cd32; --bg: #050505; }
        body { background-color: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* الهيدر والأقسام */
        header { padding: 15px 5%; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .logo { font-size: 30px; font-weight: bold; display: flex; align-items: center; gap: 10px; color: #fff; }
        .logo img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--joker-green); }
        
        .nav-links { display: flex; gap: 15px; flex-wrap: wrap; }
        .nav-links a { color: #bbb; text-decoration: none; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--joker-green); font-weight: bold; }

        /* الواجهة الرئيسية - صورة الجوكر */
        .hero { 
            height: 70vh; 
            background: linear-gradient(to top, var(--bg), transparent 50%), 
                        linear-gradient(to right, var(--bg) 10%, transparent 90%),
                        url('https://images.alphacoders.com/104/1043951.jpg'); 
            background-size: cover; background-position: center; 
            display: flex; align-items: center; padding: 0 5%;
        }
        .hero-text h1 { font-size: clamp(50px, 8vw, 100px); margin: 0; line-height: 1; text-shadow: 5px 5px 15px #000; }

        /* لوحة التحكم (مخفية وتحتاج كلمة سر للحذف فقط) */
        .admin-section { background: #111; padding: 20px; margin: 20px 5%; border-radius: 10px; border: 1px solid #333; display: flex; gap: 10px; flex-wrap: wrap; }
        input, select { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; flex: 1; min-width: 150px; }
        .btn-add { background: var(--joker-main); color: #fff; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* شبكة الأفلام */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px 5%; }
        .movie-card { background: #111; border-radius: 10px; overflow: hidden; transition: 0.4s; border: 1px solid #222; position: relative; }
        .movie-card:hover { transform: scale(1.05); border-color: var(--joker-green); z-index: 5; }
        .movie-card img { width: 100%; height: 320px; object-fit: cover; }
        .movie-card video { width: 100%; height: 320px; object-fit: cover; display: none; }
        .movie-card:hover video { display: block; }
        .movie-card:hover img { display: none; }
