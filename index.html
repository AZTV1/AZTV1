<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشغل مع قائمة حلقات</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  padding: 15px;
}

.container {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

input, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #00c853;
  color: white;
  font-weight: bold;
}

video {
  width: 100%;
  margin-top: 15px;
  border-radius: 10px;
}

.episodes {
  margin-top: 20px;
}

.episode {
  background: #222;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  cursor: pointer;
}

.episode:hover {
  background: #333;
}
</style>
</head>

<body>

<h2>🎬 مشغل + حلقات</h2>

<div class="container">

  <!-- رقم الحلقة -->
  <input type="number" id="episodeNumber" placeholder="رقم الحلقة">

  <!-- رابط الحلقة -->
  <input type="text" id="episodeLink" placeholder="رابط الحلقة (mp4 أو m3u8)">

  <button onclick="addEpisode()">➕ إضافة الحلقة</button>

</div>

<video id="videoPlayer" controls></video>

<div class="episodes">
  <h3>📺 قائمة الحلقات</h3>
  <div id="episodesList"></div>
</div>

<script>
let episodes = [];
let hls;

function addEpisode() {
  const num = document.getElementById("episodeNumber").value;
  const link = document.getElementById("episodeLink").value;

  if (!num || !link) {
    alert("حط رقم الحلقة والرابط");
    return;
  }

  episodes.push({
    number: parseInt(num),
    link: link
  });

  // ترتيب تلقائي
  episodes.sort((a, b) => a.number - b.number);

  renderEpisodes();

  // تفريغ الحقول
  document.getElementById("episodeNumber").value = "";
  document.getElementById("episodeLink").value = "";
}

function renderEpisodes() {
  const list = document.getElementById("episodesList");
  list.innerHTML = "";

  episodes.forEach(ep => {
    const div = document.createElement("div");
    div.className = "episode";
    div.innerText = "الحلقة " + ep.number;

    div.onclick = () => playEpisode(ep.link);

    list.appendChild(div);
  });
}

function playEpisode(source) {
  const video = document.getElementById("videoPlayer");

  if (source.includes(".m3u8")) {

    if (hls) {
      hls.destroy();
    }

    hls = new Hls();
    hls.loadSource(source);
    hls.attachMedia(video);

  } else {
    if (hls) {
      hls.destroy();
    }
    video.src = source;
  }
}
</script>

</body>
</html>
